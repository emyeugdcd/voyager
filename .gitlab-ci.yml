stages:
  - test
  - build

variables:
  # The login server name of the private Azure Container Registry (ACR)
  ACR_LOGIN_SERVER: "voyageracrshared.azurecr.io"

# Stage 1: Run unit tests for backend
test-backend:
  stage: test
  image: golang:1.24-alpine
  services:
    - name: postgres:15-alpine
      alias: db
  variables:
    POSTGRES_USER: postgres_test
    POSTGRES_PASSWORD: postgres_test
    POSTGRES_DB: postgres_test
    POSTGRES_HOST_AUTH_METHOD: trust
  before_script:
    - apk add --no-cache git make gcc musl-dev
  script:
    - cd sample-app-main/backend
    - go test -v ./...

# Stage 2: Build and push Backend image using Kaniko
build-backend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    # Log in to Azure Container Registry using Service Principal Client ID and Client Secret
    - echo "{\"auths\":{\"$ACR_LOGIN_SERVER\":{\"username\":\"$ARM_CLIENT_ID\",\"password\":\"$ARM_CLIENT_SECRET\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/sample-app-main/backend"
      --dockerfile "${CI_PROJECT_DIR}/sample-app-main/backend/Dockerfile"
      --destination "${ACR_LOGIN_SERVER}/backend:${CI_COMMIT_SHORT_SHA}"
      --destination "${ACR_LOGIN_SERVER}/backend:latest"
  only:
    - main

# Stage 2: Build and push Frontend image using Kaniko
build-frontend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    # Log in to Azure Container Registry using Service Principal Client ID and Client Secret
    - echo "{\"auths\":{\"$ACR_LOGIN_SERVER\":{\"username\":\"$ARM_CLIENT_ID\",\"password\":\"$ARM_CLIENT_SECRET\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/sample-app-main/frontend"
      --dockerfile "${CI_PROJECT_DIR}/sample-app-main/frontend/Dockerfile"
      --destination "${ACR_LOGIN_SERVER}/frontend:${CI_COMMIT_SHORT_SHA}"
      --destination "${ACR_LOGIN_SERVER}/frontend:latest"
  only:
    - main
