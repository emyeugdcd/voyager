apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azureKV:
      authType: WorkloadIdentity
      # REPLACE this URL with your actual Azure Key Vault URI (outputted as key_vault_uri by Terraform)
      vaultUrl: "https://keyvault-uri-placeholder.vault.azure.net/"
      serviceAccountRef:
        name: external-secrets-sa
        namespace: external-secrets
