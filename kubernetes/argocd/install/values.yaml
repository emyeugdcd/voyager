global:
  nodeSelector:
    role: tools
  tolerations:
    - key: "role"
      operator: "Equal"
      value: "tools"
      effect: "NoSchedule"

# Also configure specific sub-charts explicitly to guarantee they inherit the selectors
server:
  nodeSelector:
    role: tools
  tolerations:
    - key: "role"
      operator: "Equal"
      value: "tools"
      effect: "NoSchedule"

