apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: 'https://kubernetes-sigs.github.io/external-dns/'
      chart: external-dns
      targetRevision: 1.14.3
      helm:
        valueFiles:
    - repoURL: 'https://github.com/emyeugdcd/voyager.git'
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
