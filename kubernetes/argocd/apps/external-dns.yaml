apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: 'https://kubernetes-sigs.github.io/external-dns/'
      chart: external-dns
      targetRevision: 1.14.3
      helm:
        valueFiles:
          - $values/kubernetes/external-dns/values-test.yaml
    - repoURL: 'https://gitlab.com/emyeugdcd/voyager' 
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
