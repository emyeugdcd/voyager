apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: 'https://charts.external-secrets.io'
      chart: external-secrets
      targetRevision: 0.9.18
      helm:
        valueFiles:
          # Refers to the local git values file prefixed with the ref name
          - $values/kubernetes/external-secrets/values-test.yaml
    - repoURL: 'https://gitlab.com/emyeugdcd/voyager.git'
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
