apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: 'https://prometheus-community.github.io/helm-charts'
      chart: kube-prometheus-stack
      targetRevision: 58.6.0
      helm:
        valueFiles:
          - $values/kubernetes/monitoring/prometheus/helm-values.yaml
          - $values/kubernetes/monitoring/grafana/helm-values.yaml
    - repoURL: 'https://gitlab.com/emyeugdcd/voyager'
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # Needed for Prometheus CRDs because of their large size
