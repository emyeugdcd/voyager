apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://gitlab.com/lducanh1991/voyager.git' # REPLACE with your actual repository URL
    targetRevision: HEAD
    path: charts/frontend
    helm:
      valueFiles:
        - values-test.yaml # In production, this will be values-prod.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: sample-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
