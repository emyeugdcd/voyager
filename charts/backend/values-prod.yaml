replicaCount: 3 # High Availability for Production

image:
  tag: "stable"

ingress:
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "backend.prod-public.voyager-cloud.com"
  hosts:
    - host: backend.prod-public.voyager-cloud.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backend-tls
      hosts:
        - backend.prod-public.voyager-cloud.com

database:
  # Hostname of the prod PostgreSQL server
  host: "voyager-prod-db.postgres.database.azure.com"
  name: "sampleapp"

config:
  clientUrl: "https://frontend.prod-public.voyager-cloud.com"
