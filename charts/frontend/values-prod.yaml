replicaCount: 3 # High Availability for Production

image:
  tag: "stable"

ingress:
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "frontend.prod-public.voyager-cloud.com"
  hosts:
    - host: frontend.prod-public.voyager-cloud.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-tls
      hosts:
        - frontend.prod-public.voyager-cloud.com
